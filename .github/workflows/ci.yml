name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "deploy/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "deploy/**"]

jobs:
  app:
    name: app (front + Convex)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci || npm install

      # convex/_generated is committed (Convex convention) so typecheck/build run
      # without a live backend. The front↔convex contract is enforced here: a
      # mismatch between src/ and the generated API fails the typecheck.
      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  bridge:
    name: bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm test
