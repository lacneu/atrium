name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "deploy/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "deploy/**"]

jobs:
  frontend-image:
    name: frontend image supply chain
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Enforce minimal container policy
        run: |
          ./scripts/test-container-policy.sh
          ./scripts/test-bridge-container-policy.sh
      - name: Build the exact review candidate
        run: |
          docker build \
            --build-arg ATRIUM_VERSION=ci \
            --build-arg ATRIUM_REVISION="$GITHUB_SHA" \
            --file docker/Dockerfile \
            --tag local/atrium:ci \
            .
      - name: Generate frontend SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: local/atrium:ci
          format: spdx-json
          artifact-name: atrium-frontend-sbom.spdx.json
          syft-version: v1.48.0
          upload-artifact-retention: 90
      - name: Reject high and critical vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: local/atrium:ci
          fail-build: true
          severity-cutoff: high
          only-fixed: false
          output-format: table
          grype-version: v0.116.0

  app:
    name: app (front + Convex)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci || npm install

      # convex/_generated is committed (Convex convention) so typecheck/build run
      # without a live backend. The front↔convex contract is enforced here: a
      # mismatch between src/ and the generated API fails the typecheck.
      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  bridge:
    name: bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm test
