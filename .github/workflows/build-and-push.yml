name: Build and Push

# Two images from ONE repo, LOCKSTEP-versioned:
#   - <user>/atrium          (front + Convex, built from docker/Dockerfile)
#   - <user>/atrium-bridge   (built from bridge/Dockerfile)
#
# Triggers:
#   - tag v*          -> BOTH images build at the tag version (lockstep release)
#   - push to main    -> only the image whose paths changed -> :latest (dev speed)
#   - workflow_dispatch -> both (manual)
# Each image is only pushed AFTER its own test suite passes.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      webchat: ${{ steps.filter.outputs.webchat }}
      bridge: ${{ steps.filter.outputs.bridge }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # The webchat image-rebuild trigger is an EXCLUDE-list, NOT an allowlist.
          # An allowlist fails toward a FALSE NEGATIVE: a forgotten build input ->
          # a STALE published :latest, silently. That bit us three times (messages,
          # project.inlang, tsconfig). An exclude-list fails toward a harmless
          # OVER-build, and any future build input (public/, .npmrc, tsconfig*,
          # vite.config, ...) matches `**` automatically — we only maintain the
          # small, stable set of NON-inputs. `predicate-quantifier: every` makes a
          # filter match a file only when ALL its patterns match, so each `!...`
          # acts as an AND-condition ("changed AND not under bridge/deploy/...").
          # The leading `**` guarantees one positive pattern. `.github/**` is
          # deliberately NOT excluded: a workflow build-step change alters the
          # image and MUST rebuild it. The bridge filter is a single pattern, so
          # every-of-one == some-of-one (unchanged).
          predicate-quantifier: 'every'
          filters: |
            webchat:
              - '**'
              - '!bridge/**'
              - '!deploy/**'
              - '!docs/**'
              - '!compliance/**'
              - '!**/*.md'
            bridge:
              - 'bridge/**'

  webchat:
    needs: changes
    # Tag push (lockstep) OR manual OR the webchat paths changed on main.
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.webchat == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 } # tags needed for the dev-version stamp below
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      # Lockstep version from the tag (the SINGLE source of truth). Runs BEFORE
      # npm ci so package.json + lock stay in sync at the stamped version (no ci
      # desync). set-version stamps all artifacts; only this image is built here.
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/set-version.mjs "${GITHUB_REF#refs/tags/v}"
      # Main/manual builds: stamp an HONEST pre-release derived from the nearest
      # tag (X.Y.Z-dev.N.g<sha>). Without it :latest kept the COMMITTED number —
      # one release behind, since the chore(release) stamp lands [skip ci] — so a
      # freshly released fix pulled via :latest self-reported the PREVIOUS version
      # (the 0.19.0-labeled-but-0.19.1-code incident).
      - name: Stamp dev version (main/manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: node scripts/set-version.mjs "$(git describe --tags | sed -E 's/^v//; s/-([0-9]+)-g/-dev.\1.g/')"
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      # The TRUTHFUL lockstep version = the stamped package.json (tag or dev-stamp
      # above) — NOT the docker meta ref (which reads "main" on branch builds).
      - id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # No VITE_CONVEX_URL build-arg: the image is origin-agnostic; the URL
          # is injected at run time via /config.json. ATRIUM_VERSION (the computed
          # lockstep version) is stamped into the image env + served /version.json.
          build-args: |
            ATRIUM_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  bridge:
    needs: changes
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.bridge == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    defaults: { run: { working-directory: bridge } }
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 } # tags needed for the dev-version stamp below
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      # Lockstep version from the tag. BEFORE npm ci (in-sync package.json + lock).
      # The job default working-directory is `bridge`, so run the stamp from the
      # repo root explicitly. BRIDGE_VERSION reads bridge/package.json at runtime
      # (compat.ts), and the runtime Dockerfile COPYs it -> the image self-reports
      # the tag version.
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{ github.workspace }}
        run: node scripts/set-version.mjs "${GITHUB_REF#refs/tags/v}"
      # Main/manual builds: honest pre-release stamp (see the webchat job) — a
      # :latest bridge must never self-report the previous release's number.
      - name: Stamp dev version (main/manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        working-directory: ${{ github.workspace }}
        run: node scripts/set-version.mjs "$(git describe --tags | sed -E 's/^v//; s/-([0-9]+)-g/-dev.\1.g/')"
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}-bridge
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v7
        with:
          context: bridge
          file: bridge/Dockerfile
          push: true
          build-args: |
            ATRIUM_VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
