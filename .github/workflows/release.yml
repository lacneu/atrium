name: Release

# Tag-driven npm release of @lacneu/atrium and @lacneu/atrium-mcp (versioned
# community artifacts, same lockstep version).
# The Docker image is built separately by build-and-push.yml (also runs on tags,
# plus main + manual "Run workflow") — so the image is decoupled from npm and can
# be regenerated on demand.
on:
  push:
    tags:
      - "v*"

jobs:
  # ---- Gate: never publish a broken build --------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  # ---- npm (Trusted Publishing via OIDC — no NODE_AUTH_TOKEN) ------------------
  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      # OIDC trusted publishing requires npm CLI >= 11.5.1 (npm docs); upgrade so the
      # handshake is supported regardless of the npm bundled with Node 24.
      - name: Upgrade npm CLI to >=11.5.1 (required for Trusted Publishing)
        run: npm install -g npm@latest
      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - run: npm ci || npm install
      - name: Build dist (the published artifact)
        run: npm run build
      # Trusted Publishing (OIDC): id-token:write + the npmjs.com Trusted Publisher
      # + npm >= 11.5.1 → npm mints a short-lived token (no NODE_AUTH_TOKEN). The
      # OIDC/provenance match keys on package.json `repository.url` (MUST point at
      # this GitHub repo — it was missing, which 404'd the OIDC token exchange and
      # fell back to an anonymous PUT → "404 not found"; see npm/cli#8730, #8678).
      # `--provenance` is REQUIRED the first time a package is published via OIDC
      # when its earlier versions were published WITHOUT provenance (here 0.1.0/0.1.1
      # were manual); it can stay on afterwards (harmless). See RELEASE.md.
      - name: Publish to npm (OIDC + provenance)
        run: npm publish --access public --provenance

  # ---- npm: the observability MCP server (same OIDC pattern as above) ----------
  # Published in lockstep so `npx @lacneu/atrium-mcp@<version>` (or a pinned global
  # install in a gateway image) always matches the deployed /api/v1 surface. Its
  # own npmjs.com Trusted Publisher must exist BEFORE the first tagged publish
  # (same release.yml, Environment left blank) — see RELEASE.md pre-flight.
  publish-npm-mcp:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm CLI to >=11.5.1 (required for Trusted Publishing)
        run: npm install -g npm@latest
      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - run: npm ci || npm install
      - run: npm run typecheck
      - name: Build dist (the published artifact)
        run: npm run build
      - run: npm test
      - name: Publish to npm (OIDC + provenance)
        run: npm publish --access public --provenance

  # ---- GitHub Release (additive; never blocks publish) -------------------------
  # Runs only AFTER npm publish succeeds. Notes come from the CHANGELOG.md section
  # for this version (CURATED, rich — like 0.1.0/0.1.1). GitHub's auto-generated
  # notes are only a FALLBACK when there is no matching CHANGELOG section: this repo
  # commits straight to main (no PRs), so auto-notes are near-empty. Pattern mirrors
  # the sibling repo openclaw-knowledge-plugin.
  github-release:
    needs: [publish-npm, publish-npm-mcp]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Release for the pushed tag
    steps:
      - uses: actions/checkout@v6
      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Body = lines under "## [VERSION] ..." up to the next "## [".
          awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release_notes.md || true
          # Title = the heading text after "## [VERSION]" (drops the bracket + any
          # separator like " — "), used to name the release "Atrium <version> — <title>".
          TITLE=$(grep -m1 -E "^## \[$VERSION\]" CHANGELOG.md | sed -E "s/^## \[$VERSION\][^A-Za-z0-9]*//")
          if [ -s release_notes.md ]; then
            echo "FOUND=true" >> "$GITHUB_OUTPUT"
            echo "NAME=Atrium $VERSION${TITLE:+ — $TITLE}" >> "$GITHUB_OUTPUT"
          else
            echo "FOUND=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release (curated CHANGELOG notes)
        if: steps.changelog.outputs.FOUND == 'true'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.changelog.outputs.NAME }}
          body_path: release_notes.md
          generate_release_notes: false
      # Fallback: no CHANGELOG entry for this version -> GitHub auto-notes (chore(release)
      # bot commits excluded via .github/release.yml so they never pollute the changelog).
      - name: Create GitHub Release (auto-notes fallback)
        if: steps.changelog.outputs.FOUND == 'false'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  # ---- Commit the lockstep version back to main (additive; never blocks publish)-
  # The git TAG is the single source of truth; this job makes the repo FILES match
  # it (real numbers, no 0.0.0 placeholder) without anyone hand-editing 6 files.
  # main is unprotected (verified), so the default GITHUB_TOKEN can push; such a
  # push does NOT retrigger workflows (loop-safe) and `[skip ci]` is belt-and-
  # suspenders. The tag itself points at the pre-bump commit — artifacts are stamped
  # from the tag NAME at build, so they are correct regardless (see RELEASE.md).
  version-commit-back:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version-bump commit to main
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Stamp committed version to the tag (lockstep)
        run: node scripts/set-version.mjs "${GITHUB_REF#refs/tags/v}"
      - name: Commit version bump back to main (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Files already at ${GITHUB_REF#refs/tags/v}; nothing to commit."
          else
            git add -A
            git commit -m "chore(release): ${GITHUB_REF#refs/tags/v} [skip ci]"
            git push origin main
          fi
