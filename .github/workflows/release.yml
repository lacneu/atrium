name: Release

# Tag-driven npm release of @lacneu/atrium (versioned community artifact).
# The Docker image is built separately by build-and-push.yml (also runs on tags,
# plus main + manual "Run workflow") — so the image is decoupled from npm and can
# be regenerated on demand.
on:
  push:
    tags:
      - "v*"

jobs:
  # ---- Gate: never publish a broken build --------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  # ---- npm (Trusted Publishing via OIDC — no NODE_AUTH_TOKEN) ------------------
  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (>=11.5.1 required for Trusted Publishing)
        run: npm install -g npm@latest
      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - run: npm ci || npm install
      - name: Build dist (the published artifact)
        run: npm run build
      # NOTE: the FIRST publish of a brand-new package cannot use OIDC — bootstrap
      # @lacneu/atrium once manually (npm publish --access public), then
      # enable Trusted Publishing for it. See deploy runbook (DEPLOY.md, Stage 0).
      - name: Publish to npm
        run: npm publish --access public
