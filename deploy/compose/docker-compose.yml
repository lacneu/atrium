# Atrium — full self-contained stack (one company / tenant).
#
# Four services on ONE Docker network, so internal links use SERVICE NAMES (no
# host IPs to configure):
#   stateful  : convex-backend (self-hosted Convex + SQLite) + convex-dashboard
#   stateless : frontend (static) + bridge (talks to your OpenClaw gateway)
#
# Bring your own OpenClaw gateway: its URL + credentials are configured in Convex
# (Settings -> Agents -> Instances), and the bridge fetches them at boot via the
# per-bridge secret(s) in BRIDGE_INSTANCE_SECRETS. Public HTTPS routing (browser ->
# frontend, OAuth callbacks, the Convex public origins) is handled by YOUR reverse
# proxy / ingress — this compose only publishes host ports.
#
# The convex-backend image is a GENERIC, EMPTY backend — it ships none of this
# app's code. `bootstrap-env.sh` (run from a full repo checkout) makes it usable:
# it pushes the Convex deployment env AND deploys this repo's Convex functions.
#
# Quick start:
#   1. cp .env.example .env   &&   edit .env   (fill every required value)
#   2. docker compose up -d                    (brings up all four services)
#   3. ./bootstrap-env.sh                       (push Convex env + deploy the
#                                                Convex functions — see the script)
#   4. open the app; the FIRST sign-in (from an allowed domain) becomes admin.
#
# Lifecycle (stateful vs stateless): the Convex data lives in the named volume
# `convex-data` and SURVIVES container recreation. To redeploy ONLY the
# stateless tier (app/bridge) without touching the backend, target the services
# by name (no profiles needed — `docker compose up -d` brings up ALL four):
#   docker compose up -d --no-deps --force-recreate frontend bridge
# NEVER `docker compose down -v` unless you intend to WIPE the database.

services:
  # --- stateful tier (holds the DB; rarely recreated) ----------------------
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: ${COMPOSE_PROJECT_NAME:-atrium}-convex-backend
    restart: unless-stopped
    ports:
      - "${CONVEX_CLOUD_PORT:-3210}:3210" # cloud origin (queries/mutations)
      - "${CONVEX_SITE_PORT:-3211}:3211"  # site origin (HTTP actions / .site)
    environment:
      - INSTANCE_NAME=${CONVEX_INSTANCE_NAME:?set in .env}
      - INSTANCE_SECRET=${CONVEX_INSTANCE_SECRET:?generate + back up; mints admin keys}
      # PUBLIC HTTPS origins as reached by the BROWSER (via your proxy/ingress).
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN:?public https URL for the cloud origin}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN:?public https URL for the site origin}
      - DISABLE_BEACON=true
      - RUST_LOG=${CONVEX_RUST_LOG:-info}
    volumes:
      - convex-data:/convex/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3210/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: ${COMPOSE_PROJECT_NAME:-atrium}-convex-dashboard
    restart: unless-stopped
    ports:
      # Admin-key-gated. Bind to 127.0.0.1 (default) and reach via SSH tunnel, or
      # publish behind a LAN-only proxy. Do NOT expose publicly.
      - "${CONVEX_DASHBOARD_BIND:-127.0.0.1}:${CONVEX_DASHBOARD_PORT:-6791}:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN:?public https URL for the cloud origin}
    depends_on:
      convex-backend:
        condition: service_healthy

  # --- stateless tier (prebuilt images; retagged often) --------------------
  frontend:
    image: ${WEBCHAT_IMAGE:-ghcr.io/lacneu/atrium}:${WEBCHAT_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-atrium}-frontend
    restart: unless-stopped
    ports:
      - "${WEBCHAT_PORT:-8788}:80"
    environment:
      # Public Convex cloud origin the BROWSER reaches; written into /config.json
      # at boot (the image is origin-agnostic).
      - CONVEX_URL=${CONVEX_CLOUD_ORIGIN:?public https URL for the cloud origin}

  bridge:
    image: ${BRIDGE_IMAGE:-ghcr.io/lacneu/atrium-bridge}:${BRIDGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-atrium}-bridge
    restart: unless-stopped
    ports:
      - "${BRIDGE_PORT:-8787}:8787"
    environment:
      # Per-bridge secret(s): COMMA-separated, ONE per Convex instance this bridge
      # serves. Each secret is minted in Settings -> Agents -> Instances ->
      # Credentials ("Secret du bridge"), resolves 1:1 to its instance, and unlocks
      # ONLY that instance's encrypted gateway credentials (isolation per secret).
      # The bridge fetches each instance's gateway URL + version + HTTP override +
      # decrypted token + device identity from Convex at boot using these secrets —
      # there is NO gateway env any more (no OPENCLAW_GATEWAY_URL / _TOKEN /
      # _DEVICE_IDENTITY / _INSTANCE_NAME). Decryption needs ATRIUM_SECRET_KEY on the
      # CONVEX deployment (see .env.example section B). DEFAULTS EMPTY on purpose: the
      # bootstrap order is `docker compose up -d` FIRST, THEN mint the per-bridge
      # secret(s) in the UI (Settings -> Agents -> Instances -> Credentials) and set
      # this — so `up` must not hard-fail on a blank value. The bridge then fails fast
      # at boot with a clear "no instances to serve" error until it is set + recreated.
      # ONE bridge, MANY gateways: list several secrets to serve several instances, e.g.
      #   BRIDGE_INSTANCE_SECRETS=<olivier-secret>,<jerome-secret>
      # then add a pair of media mounts per served instance (see the shared-fs block).
      # REQUIRED for the multi-gateway case: set EACH Convex instance's Bridge URL
      # (Settings -> Agents -> Instances -> Bridge URL) to THIS bridge — e.g. all to
      # http://bridge:8787. Convex dispatch falls back to the deployment BRIDGE_URL only
      # for the SOLE/served instance (to avoid cross-routing in the one-bridge-per-gateway
      # topology), so a second instance without its own Bridge URL would be `not_configured`.
      - BRIDGE_INSTANCE_SECRETS=${BRIDGE_INSTANCE_SECRETS:-}
      # Convex .site origin — SERVICE NAME (same network), no host IP needed.
      - CONVEX_HTTP_ACTIONS_URL=http://convex-backend:3211
      - BRIDGE_INGEST_SECRET=${BRIDGE_INGEST_SECRET:?shared with the Convex deployment env}
      - BRIDGE_SHARED_SECRET=${BRIDGE_SHARED_SECRET:?shared with the Convex deployment env}
      # Media transport MODE, per-file size CAP, agent-visible mount PATHS and
      # session rehydration are PER-INSTANCE settings configured in Atrium -> Settings
      # -> Agents -> Bridge (applied HOT, in-band on each send, no restart) — NOT env
      # vars here. (The gateway URL + version + gateway-http HTTP override come from
      # Convex at boot, see above.) The bridge defaults to gateway-http
      # (fetch bytes over HTTP from the gateway's assistant-media endpoint; NO shared
      # filesystem needed) until the first send carries the instance config. For
      # shared-fs, only the per-instance DEPLOY-TIME plumbing below lives here (a docker
      # mount can't be hot).
      #
      # [shared-fs] The dirs the BRIDGE reads/writes auto-derive from each served
      # instance's NAME (resolved from Convex via its per-bridge secret, NOT env):
      # `/home/node/.openclaw/media/<instance>/{outbound,inbound}`. Keying by instance
      # keeps EACH served gateway's mount distinct + self-documenting, so one bridge can
      # serve several instances. The `volumes:` mount target below MUST equal that
      # derived path (use the LITERAL instance name — there is no OPENCLAW_INSTANCE_NAME
      # env to interpolate); a mismatch is the #1 shared-fs misconfig: ENOENT, every file
      # silently undeliverable (the "Vérifier les chemins" button surfaces it). These are
      # the BRIDGE-side paths, NOT the gateway's — the agent-visible mount stays flat
      # `/home/node/.openclaw/media/{outbound,inbound}` (what the gateway exposes +
      # openclaw.json `file-transfer.allowReadPaths` whitelists; do NOT key it). When a
      # bridge serves a SINGLE instance you may override with OPENCLAW_MEDIA_OUTBOUND_DIR
      # / OPENCLAW_INBOUND_DIR (process-global — do NOT use them with several instances).
      # Full guide + worked one-bridge-two-instances example: deploy/SHARED_FS_MEDIA.md.
      # [shared-fs] Reap staged inbound files older than this (> the longest turn).
      - OPENCLAW_INBOUND_TTL_MS=${OPENCLAW_INBOUND_TTL_MS:-21600000}
      # [gateway-http mode] Connection timeout (ms): bounds the media meta-probe +
      # response headers so a non-responsive gateway can't stall a turn (the body
      # then streams at the upload's pace). Default 60s.
      - OPENCLAW_MEDIA_FETCH_TIMEOUT_MS=${OPENCLAW_MEDIA_FETCH_TIMEOUT_MS:-60000}
      - BRIDGE_PORT=8787
    # ── TO ENABLE shared-fs media (deterministic delivery — see below) ──────────
    # shared-fs is the ONLY way to deliver agent-produced files DETERMINISTICALLY:
    # the bridge SCANS the outbound dir at end-of-turn and hosts every file the agent
    # wrote, independent of whether the LLM emitted a `MEDIA:` line (empirically the
    # gateway surfaces NOTHING for a bare file write — no mediaUrls, no artifacts; it
    # only signals a file if the LLM cooperates). gateway-http (the default) cannot do
    # this. So for reliable downloads, enable shared-fs:
    #
    #   1. Settings -> Agents -> Bridge -> (per instance) set Outbound + Inbound mode
    #      to shared-fs (hot; no restart).
    #   2. Uncomment `user:` below and set it to the SAME uid:gid the gateway container
    #      runs as. The bridge WRITES inbound files; the gateway's agent (its uid) must
    #      be able to READ them — a uid mismatch makes inbound silently "permission
    #      denied". (Alternative: a default ACL `setfacl -d -m o::rX` on the host dirs.)
    #   3. Create the HOST media dirs FIRST, owned by the gateway uid (else the mount
    #      auto-creates them root-owned → the agent can't read). For an instance whose
    #      gateway mounts `<root>/instances/<name>/.openclaw`, the host dirs are
    #      `<root>/instances/<name>/.openclaw/media/{outbound,inbound}`:
    #        mkdir -p <root>/instances/<name>/.openclaw/media/{inbound,outbound}
    #        chown -R <uid>:<gid> <root>/instances/<name>/.openclaw/media
    #   4. Uncomment the `volumes:` block and point each HOST source at those dirs. The
    #      mount TARGET is keyed by the LITERAL instance name so it equals the bridge's
    #      auto-derived dir (there is no OPENCLAW_INSTANCE_NAME env to interpolate now).
    #      Outbound is :ro (bridge only reads agent output); inbound is rw (bridge writes
    #      staged files).
    #   5. Recreate the bridge (a docker mount is NOT hot): `up -d --force-recreate bridge`,
    #      then click "Vérifier les chemins" in the per-instance config modal.
    #
    # One bridge can serve SEVERAL gateways: list several secrets in
    # BRIDGE_INSTANCE_SECRETS and mount EACH served instance's host dirs, keyed by that
    # instance's literal name. The example below serves two instances (`olivier`,
    # `jerome`) from one bridge. (Running one bridge container per gateway also still
    # works — give each its own secret, host dirs, port and Convex `instances.bridgeUrl`.)
    # A bridge process has ONE `user:`, so all served gateways must share that uid:gid
    # (or use a default ACL on the host dirs). Full worked example: deploy/SHARED_FS_MEDIA.md.
    # user: "${BRIDGE_RUN_AS_UID:?gateway uid:gid, e.g. 1000017:1000011}"
    # volumes:
    #   - ${OLIVIER_MEDIA_OUTBOUND_HOST_DIR:?host path to olivier's media/outbound dir}:/home/node/.openclaw/media/olivier/outbound:ro
    #   - ${OLIVIER_INBOUND_HOST_DIR:?host path to olivier's media/inbound dir}:/home/node/.openclaw/media/olivier/inbound
    #   - ${JEROME_MEDIA_OUTBOUND_HOST_DIR:?host path to jerome's media/outbound dir}:/home/node/.openclaw/media/jerome/outbound:ro
    #   - ${JEROME_INBOUND_HOST_DIR:?host path to jerome's media/inbound dir}:/home/node/.openclaw/media/jerome/inbound
    # NO depends_on convex-backend ON PURPOSE: the bridge boots without touching
    # Convex (it reaches convex-backend by service DNS only on ingest, with
    # retry), so a hard depends_on would needlessly couple their lifecycles and
    # block a stateless-only redeploy (`up -d --no-deps frontend bridge`) on
    # backend health. The bridge tolerates Convex coming up after it.

volumes:
  # Convex SQLite data. Back up via `npx convex export`, not just a volume snapshot.
  convex-data:
