{{- /*
PUBLIC Ingress for the FRONTEND ONLY. The Convex dashboard is NEVER exposed
here (admin-key-gated, ClusterIP only). ingressClassName / annotations / hosts /
tls are values — provider-portable (nginx, traefik, AKS app routing, ...).
*/ -}}
{{- if .Values.ingress.enabled -}}
{{- $fullName := include "atrium.componentName" (dict "ctx" . "component" "frontend") -}}
{{- $svcPort := .Values.webchat.servicePort -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "atrium.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
