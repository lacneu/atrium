{{- /*
Bootstrap Job — reconciles the CONVEX DEPLOYMENT env (read by Convex FUNCTIONS
via process.env). Port of compose/bootstrap-env.sh STEP 1 (env) into a Helm hook.

SCOPE — env ONLY: this Job does NOT deploy the app's Convex functions/HTTP routes
(`npx convex deploy`). The cluster Job runs a generic Node image with no access
to the `convex/` source, so the function deploy is a separate operator/CI step
(see deploy/README.md "Deploy the Convex functions"). A fresh backend is unusable
until those functions are pushed.

Ordering & lifecycle:
  * post-install,post-upgrade hook so it runs every (re)deploy.
  * hook-weight runs it LAST among hooks.
  * hook-delete-policy before-hook-creation: a previous Job is removed first so
    a re-run never collides on the immutable Job name.
  * restartPolicy: OnFailure + backoffLimit so transient backend-startup races
    self-heal. hook-weight does NOT wait for the StatefulSet to be Ready, so the
    Job ITSELF polls http://<backend>:3210/version before any env set.

Admin key:
  The convex-backend image ships generate_admin_key.sh, which derives the key
  LOCALLY from INSTANCE_NAME + INSTANCE_SECRET via the bundled generate_key
  binary (no live server needed for the derivation; verified empirically). An
  initContainer using that image writes the key to a shared emptyDir. DATA_DIR
  points at the emptyDir (NOT the StatefulSet PVC) so the derivation is fully
  self-contained — read_credentials.sh only falls back to files when the env
  vars are unset, and we always inject both from the Secret.

  CORRECTNESS LINCHPIN: the StatefulSet and this initContainer derive the key
  from the SAME INSTANCE_NAME + INSTANCE_SECRET (same Secret keys). If they
  differed, the derived key would 401 against the backend.
*/ -}}
{{- if .Values.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "atrium.componentName" (dict "ctx" . "component" "bootstrap-env") }}
  labels:
    {{- include "atrium.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": {{ .Values.bootstrap.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.bootstrap.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "atrium.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "atrium.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # 1) Derive the admin key locally (no live server) into the shared
        #    emptyDir. Mirrors bootstrap-env.sh step 2's `generate_admin_key.sh`
        #    output parse: strip CR, take the last stdout line (the name|hex key).
        - name: mint-admin-key
          image: {{ include "atrium.image" (dict "repository" .Values.convexBackend.image "tag" .Values.convexBackend.tag "defaultTag" "latest") }}
          imagePullPolicy: {{ .Values.convexBackend.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              # Self-contained derivation: DATA_DIR is the emptyDir, NOT the PVC.
              export DATA_DIR=/work/cvxdata
              mkdir -p "$DATA_DIR"
              ADMIN_KEY="$(cd /convex && ./generate_admin_key.sh 2>/dev/null | tr -d '\r' | tail -n1)"
              if [ -z "$ADMIN_KEY" ]; then
                echo "FATAL: could not derive admin key (generate_admin_key.sh)" >&2
                exit 1
              fi
              printf '%s' "$ADMIN_KEY" > /work/admin_key
              echo "[bootstrap] derived admin key for instance: ${ADMIN_KEY%%|*}"
          env:
            - name: INSTANCE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "atrium.secretName" . }}
                  key: CONVEX_INSTANCE_NAME
            - name: INSTANCE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "atrium.secretName" . }}
                  key: CONVEX_INSTANCE_SECRET
          volumeMounts:
            - name: work
              mountPath: /work
          resources:
            {{- toYaml .Values.bootstrap.resources | nindent 12 }}
        # 2) Wait for the backend /version to be healthy. hook-weight does NOT
        #    wait for Readiness, so this poll (bootstrap-env.sh step 1) is what
        #    actually serializes the env-set after the StatefulSet is up.
        - name: wait-for-backend
          image: {{ .Values.bootstrap.nodeImage }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              URL="{{ include "atrium.convexCloudInClusterUrl" . }}/version"
              DEADLINE=$(( $(date +%s) + {{ .Values.bootstrap.readinessTimeoutSeconds }} ))
              echo "[bootstrap] waiting for ${URL} ..."
              until wget -q -O /dev/null "$URL" 2>/dev/null; do
                if [ "$(date +%s)" -ge "$DEADLINE" ]; then
                  echo "FATAL: backend not healthy after {{ .Values.bootstrap.readinessTimeoutSeconds }}s" >&2
                  exit 1
                fi
                sleep 3
              done
              echo "[bootstrap] backend healthy."
          resources:
            {{- toYaml .Values.bootstrap.resources | nindent 12 }}
      containers:
        # 3) Idempotently push every Convex-DEPLOYMENT-scoped var. AUTH gate
        #    FIRST. set-only-on-diff (mirrors bootstrap-env.sh set_env()).
        - name: convex-env-set
          image: {{ .Values.bootstrap.nodeImage }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export CONVEX_SELF_HOSTED_URL="{{ include "atrium.convexCloudInClusterUrl" . }}"
              CONVEX_SELF_HOSTED_ADMIN_KEY="$(cat /work/admin_key)"
              export CONVEX_SELF_HOSTED_ADMIN_KEY
              {{- if .Values.bootstrap.convexCliVersion }}
              CONVEX_PKG="convex@{{ .Values.bootstrap.convexCliVersion }}"
              {{- else }}
              CONVEX_PKG="convex"
              {{- end }}

              set_env() {
                name="$1"; value="${2:-}"
                if [ -z "$value" ]; then
                  echo "  · ${name}: (blank, skipped)"
                  return 0
                fi
                current="$(npx --yes "$CONVEX_PKG" env get "$name" 2>/dev/null || true)"
                if [ "$current" = "$value" ]; then
                  echo "  = ${name}: unchanged"
                else
                  npx --yes "$CONVEX_PKG" env set "$name" -- "$value" >/dev/null
                  echo "  + ${name}: set"
                fi
              }

              echo "[bootstrap] reconciling Convex deployment env (auth gate first) ..."
              # AUTH_ALLOWED_EMAIL_DOMAINS FIRST — authoritative sign-in gate.
              set_env AUTH_ALLOWED_EMAIL_DOMAINS "${AUTH_ALLOWED_EMAIL_DOMAINS:-}"

              # Service-DNS / release-derived wiring (NOT secrets).
              set_env SITE_URL "${SITE_URL:-}"
              set_env BRIDGE_URL "${BRIDGE_URL:-}"
              set_env BRIDGE_INSTANCE_NAME "${BRIDGE_INSTANCE_NAME:-}"

              # The rest (mostly from the Secret).
              for v in \
                AUTH_GOOGLE_ID AUTH_GOOGLE_SECRET \
                AUTH_MICROSOFT_ENTRA_ID_ID AUTH_MICROSOFT_ENTRA_ID_SECRET AUTH_MICROSOFT_ENTRA_ID_ISSUER \
                JWT_PRIVATE_KEY JWKS \
                ATRIUM_SECRET_KEY \
                BRIDGE_SHARED_SECRET BRIDGE_INGEST_SECRET \
                LANGFUSE_PUBLIC_KEY LANGFUSE_SECRET_KEY LANGFUSE_HOST \
                OPIK_API_KEY OPIK_WORKSPACE OPIK_BASE_URL ; do
                # Quote inside the eval so multiline PEM (JWT_PRIVATE_KEY) and
                # JSON (JWKS) values are not field-split / re-parsed by ash.
                eval "val=\"\${$v:-}\""
                set_env "$v" "$val"
              done

              echo "[bootstrap] Convex deployment env reconciled. First sign-in from"
              echo "            an allowed domain becomes admin."
          env:
            # --- release-derived / value-sourced (NOT secrets) ---
            - name: SITE_URL
              value: {{ .Values.app.siteUrl | quote }}
            - name: BRIDGE_URL
              value: {{ include "atrium.bridgeInClusterUrl" . | quote }}
            - name: BRIDGE_INSTANCE_NAME
              value: {{ .Values.bridge.instanceName | quote }}
            # --- the auth gate + OAuth + auth keys + trace keys, from the Secret ---
            - name: AUTH_ALLOWED_EMAIL_DOMAINS
              valueFrom:
                secretKeyRef:
                  name: {{ include "atrium.secretName" . }}
                  key: AUTH_ALLOWED_EMAIL_DOMAINS
            {{- range $k := list "AUTH_GOOGLE_ID" "AUTH_GOOGLE_SECRET" "AUTH_MICROSOFT_ENTRA_ID_ID" "AUTH_MICROSOFT_ENTRA_ID_SECRET" "AUTH_MICROSOFT_ENTRA_ID_ISSUER" "JWT_PRIVATE_KEY" "JWKS" "ATRIUM_SECRET_KEY" "BRIDGE_SHARED_SECRET" "BRIDGE_INGEST_SECRET" "LANGFUSE_PUBLIC_KEY" "LANGFUSE_SECRET_KEY" "LANGFUSE_HOST" "OPIK_API_KEY" "OPIK_WORKSPACE" "OPIK_BASE_URL" }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "atrium.secretName" $ }}
                  key: {{ $k }}
                  optional: true
            {{- end }}
          volumeMounts:
            - name: work
              mountPath: /work
          resources:
            {{- toYaml .Values.bootstrap.resources | nindent 12 }}
      volumes:
        - name: work
          emptyDir: {}
{{- end }}
