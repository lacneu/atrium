{{- /*
Render a Kubernetes Secret ONLY when no existingSecret is supplied. In
production you should instead point secrets.existingSecret at a Secret managed
by an external store (Azure Key Vault CSI, external-secrets, sealed-secrets) —
see values-aks.yaml. Secrets NEVER live in a ConfigMap.
*/ -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "atrium.componentName" (dict "ctx" . "component" "secrets") }}
  labels:
    {{- include "atrium.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.values }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
