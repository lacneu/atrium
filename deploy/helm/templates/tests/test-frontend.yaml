{{- /*
`helm test` smoke check: the frontend Service answers on its HTTP port. Run with
`helm test <release>`. Cleaned up automatically.
*/ -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "atrium.componentName" (dict "ctx" . "component" "test-frontend") }}
  labels:
    {{- include "atrium.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: {{ .Values.bootstrap.nodeImage }}
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          URL="http://{{ include "atrium.componentName" (dict "ctx" . "component" "frontend") }}:{{ .Values.webchat.servicePort }}/"
          echo "GET ${URL}"
          wget -q -O /dev/null "$URL"
          echo "frontend OK"
