apiVersion: v2
name: atrium
description: >-
  Atrium — a self-contained chat stack (self-hosted Convex backend,
  Convex dashboard, static frontend, and a bridge to your external OpenClaw
  gateway). Convex is modeled as a single-replica StatefulSet with a PVC; the
  frontend and bridge are Deployments; the Convex deployment env is reconciled
  by an ordered post-install/post-upgrade Job. Provider-portable: ingress class,
  storage class, secret source and per-component images are values.
type: application
# Chart version — bump on chart changes.
version: 0.1.0
# Default app version (the lockstep frontend+bridge release). Override per-deploy
# via values (webchat.tag / bridge.tag). Convex backend/dashboard track their
# own upstream images (see values.yaml).
appVersion: "latest"
keywords:
  - openclaw
  - webchat
  - convex
  - chat
home: https://github.com/example/atrium
sources:
  - https://github.com/example/atrium
maintainers:
  - name: Atrium community
    url: https://github.com/example/atrium
annotations:
  category: Chat
